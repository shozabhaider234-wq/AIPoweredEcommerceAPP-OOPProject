spring.application.name=AiPoweredEcommerceSystem

# =============================================================
# application.properties ? AI-Powered Ecommerce Backend
# Database: MySQL 8.x
# =============================================================

# ?? Server ????????????????????????????????????????????????????
server.port=8080

# ?? MySQL DataSource ??????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/aiecomerceapp?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ???????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ?? Connection Pool (HikariCP) ????????????????????????????????
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ?? File Upload ???????????????????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/products

# ?? JWT ???????????????????????????????????????????????????????
app.jwt.secret=ThisIsAVeryLongAndSecureJwtSecretKeyForEcommerceApp2024!@#$%^&*
app.jwt.expiration-ms=86400000

# ?? Spring AI ? Groq (OpenAI-compatible endpoint) ?????????????
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=1024

# ?? Logging ???????????????????????????????????????????????????
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.ai=DEBUG
logging.level.org.hibernate.SQL=DEBUG